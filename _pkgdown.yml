url: https://ahadi-analytics.github.io/sntutils/

template:
  bootstrap: 5
  bootswatch: flatly
  light-switch: true
  bslib:
    primary: "#0F2333"
    secondary: "#628DA5"
    success: "#B3CB72"
    info: "#5EAADD"
    warning: "#FFC225"
    danger: "#ff7a7a"
    link-color: "#4682B4"
    link-hover-color: "#FFC225"
    navbar-bg: "#0F2333"
    navbar-fg: "#FFFFFF"
    headings-color: "#0F2333"
    base_font: {google: "Inter"}
    heading_font: {google: "Inter"}
    code_font: {google: "JetBrains Mono"}

development:
  mode: auto

opengraph:
  image:
    src: man/figures/logo.png
    alt: "sntutils — utilities for Subnational Tailoring of malaria interventions"

home:
  title: sntutils — utilities for Subnational Tailoring of malaria interventions
  description: >
    R package developed by AHADI to support the Subnational Tailoring (SNT) of
    malaria interventions. Standardises and streamlines data preparation,
    cleaning, spatial validation, climate downloads, reporting-rate analytics,
    population processing and visualisation for evidence-based decisions at
    district level and below.
  sidebar:
    structure: [links, license, community, citation, authors, dev]
  links:
    - text: AHADI website
      href: https://appliedhealthanalytics.org
    - text: Subnational Tailoring code library
      href: https://ahadi-analytics.github.io/snt-code-library/

