reference:
- title: Data import and export
  desc: Read and write a wide range of tabular and spatial formats, with an SNT-aware wrapper that hashes, fingerprints and writes sidecar metadata.
  contents:
  - read
  - write
  - read_snt_data
  - write_snt_data

- title: Data cleaning and standardisation
  desc: Type inference, date parsing, name and column harmonisation, and dictionary building.
  contents:
  - auto_parse_types
  - autoparse_dates
  - available_date_formats
  - standardize_names
  - clean_filenames
  - prep_geonames
  - build_dictionary
  - snt_data_dict
  - check_snt_var

- title: Spatial validation and mapping
  desc: Validate and harmonise admin geometries and facility coordinates, crosswalk between shapefile vintages, fuzzy-match names, and render maps.
  contents:
  - validate_process_spatial
  - validate_process_coordinates
  - fuzzy_match_facilities
  - calculate_match_stats
  - crosswalk_shapefiles_sf
  - dhis2_map
  - plot_admin_map_distinct
  - facetted_map_bins
  - facetted_map_gradient
  - get_palette
  - list_palettes
  - download_shapefile

- title: Routine surveillance — reporting rates
  desc: Quantify and visualise how completely health facilities are reporting, by time and admin unit.
  contents:
  - calculate_reporting_metrics
  - calculate_reporting_metrics_dates
  - reporting_rate_plot
  - reporting_rate_map
  - facility_reporting_plot
  - classify_facility_activity
  - get_active_facilities
  - validate_routine_hf_data

- title: Routine surveillance — data quality
  desc: Cascade consistency checks, outlier detection and correction, imputation helpers.
  contents:
  - consistency_check
  - consistency_map
  - detect_outliers
  - outlier_plot
  - correct_outliers
  - impute_outlier_ma
  - impute_higher_admin
  - compare_methods_plot
  - fallback_diff
  - fallback_row_sum
  - safe_sum

- title: Climate and environmental downloads
  desc: Pull rainfall, temperature, land cover and other environmental rasters from public archives.
  contents:
  - download_chirps
  - check_chirps_available
  - chirps_options
  - download_era5
  - check_era5_available
  - era5_options
  - get_era5_metadata
  - print_era5_metadata
  - read_era5
  - migrate_era5_filenames
  - download_modis
  - modis_options
  - download_process_nasapower
  - process_ihme_u5m_raster

- title: Population downloads and processing
  desc: WorldPop downloads (totals, age-bands, urbanicity), extrapolation, and SNT-shaped population outputs.
  contents:
  - download_worldpop
  - download_worldpop_age_band
  - download_worldpop_urbanicity
  - get_worldpop_paths
  - extrapolate_pop
  - snt_process_population

- title: Raster batch processing
  desc: Aggregate raster stacks to admin units (zonal stats), with optional population weighting and time-varying boundaries.
  contents:
  - process_raster_collection
  - process_raster_with_boundaries
  - process_rasters_by_year
  - process_weighted_raster_collection
  - process_weighted_raster_stacks
  - normalize_raster_by_polygon
  - tidy_malaria_raster_names

- title: DHS indicators
  desc: Bulk download and lookup of DHS/MIS indicators.
  contents:
  - download_dhs_indicators
  - check_dhs_indicators
  - get_dhs_data

- title: EMOD demography and weather inputs
  desc: Build demographic and climate inputs for EMOD-style simulations from SNT data.
  contents:
  - build_emod_demog
  - build_emod_demog_from_wpp
  - write_emod_demog_by_adm2
  - read_emod_weather
  - write_emod_weather
  - write_emod_weather_by_adm2

- title: Project structure and paths
  desc: Create the AHADI hierarchical data folders, set up a full project skeleton, resolve standardised paths.
  contents:
  - setup_project_paths
  - create_data_structure
  - initialize_project_structure
  - ahadi_path
  - clear_snt_cache

- title: Translation and localisation
  desc: Cached Google Translate wrappers plus locale-aware year-month formatting.
  contents:
  - translate_text
  - translate_text_vec
  - translate_yearmon
  - french_malaria_acronyms

- title: Plotting helpers and trend models
  desc: Reusable building blocks for SNT plots — palettes, model wrappers, IR plots.
  contents:
  - get_model
  - generate_ir_plot
  - run_resistance_trend
  - prepare_plot_data
  - get_pathway_vars
  - auto_bin
  - detect_factors
  - detect_time_pattern
  - extract_time_components

- title: Numeric and hashing utilities
  desc: Small but very-used helpers that show up across SNT pipelines.
  contents:
  - big_mark
  - sum2
  - mean2
  - median2
  - vdigest
  - compress_png

- title: internal
  desc: Internal helpers and datasets — documented for completeness but not part of the public API.
  contents:
  - batch_extract_weighted_stats
  - calculate_plot_dimensions
  - create_common_elements
  - dot-get_filename_abbrev
  - ensure_packages
  - get_translated_terms
  - group_plot
  - print.dhs_duckdb
  - save_single_plot
  - snt_var_tree
  - translate_plot_labels
  - validation_terms
  - variables_plot

